<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tekkytronix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PANTALLA: Inicio -->
  <div id="screen-start" class="screen screen--active">
    <div class="start__content">
      <h1 class="start__title">TEKKYTRONIX</h1>
      <p class="start__subtitle">Repara los sistemas del universo</p>
      <button id="btn-continue" class="btn btn--primary" style="display:none">Continuar misión</button>
      <button id="btn-start" class="btn btn--primary">Nueva misión</button>
      <p id="start-repaired" class="start__repaired" style="display:none"></p>
      <button id="btn-clear-history" class="btn btn--danger" style="display:none">Borrar historial</button>
    </div>
  </div>

  <!-- PANTALLA: Mapa de galaxia -->
  <div id="screen-map" class="screen screen--hidden">
    <header class="map__header">
      <h2 class="map__title">Mapa Galáctico</h2>
      <p class="map__subtitle">Selecciona un sistema para reparar</p>
    </header>
    <div id="map-nodes" class="map__nodes"></div>
  </div>

  <!-- PANTALLA: Nivel -->
  <div id="screen-level" class="screen screen--hidden">
    <header class="level__header">
      <button id="btn-back-map" class="btn btn--icon" title="Volver al mapa">←</button>
      <span id="level-title" class="level__title"></span>
      <div class="level__hud">
        <span id="hud-attempts" class="hud-item">Intentos: 0</span>
        <span id="hud-timer" class="hud-item">0s</span>
      </div>
    </header>

    <div class="level__body" id="level-body">
      <!-- Se renderiza dinámicamente según el tipo de nivel -->
    </div>

    <footer class="level__footer">
      <button id="btn-check" class="btn btn--check">Verificar</button>
      <button id="btn-reset" class="btn btn--reset">Reiniciar</button>
    </footer>
  </div>

  <!-- PANTALLA: Nivel completado -->
  <div id="screen-feedback" class="screen screen--hidden">
    <div class="feedback__content">
      <div class="feedback__icon">✦</div>
      <h2 class="feedback__title">¡Sistema reparado!</h2>
      <p id="feedback-stats" class="feedback__stats"></p>
      <div id="feedback-counter" class="feedback__counter"></div>
      <button id="btn-next" class="btn btn--primary">Siguiente sistema</button>
      <button id="btn-map" class="btn btn--secondary">Ver mapa</button>
    </div>
  </div>

  <!-- Datos (debe ir primero) -->
  <script src="src/data/levels.js"></script>

  <!-- Utilidades (orden importa) -->
  <script src="src/utils/storage.js"></script>
  <script src="src/utils/constants.js"></script>
  <script src="src/utils/helpers.js"></script>

  <!-- Core -->
  <script src="src/core/event-bus.js"></script>
  <script src="src/core/game-state.js"></script>
  <script src="src/core/level-repository.js"></script>
  <script src="src/core/progress-manager.js"></script>

  <!-- Gameplay -->
  <script src="src/gameplay/pattern-validator.js"></script>
  <script src="src/gameplay/classification-validator.js"></script>
  <script src="src/core/rule-engine.js"></script>

  <!-- UI -->
  <script src="src/ui/screen-manager.js"></script>
  <script src="src/ui/feedback-controller.js"></script>
  <script src="src/ui/hud.js"></script>

  <!-- Entry point -->
  <script src="main.js"></script>
</body>
</html>
